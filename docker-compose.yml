version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: trustfl_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: trustfl_hospital_db
    ports:
      - "5433:5432" # Changed from 5432 to 5433 to avoid conflicts on host
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: trustfl_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@trustfl.com
      PGADMIN_DEFAULT_PASSWORD: adminpassword
    ports:
      - "5050:80"
    depends_on:
      - db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trustfl_backend
    environment:
      - DATABASE_URL=postgresql://admin:adminpassword@db:5432/trustfl_hospital_db
      - SECRET_KEY=b9c4c5e8b0d2d6c6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - ADMIN_SECRET_KEY=admin123
    ports:
      - "8001:8001"
    depends_on:
      - db
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: trustfl_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
